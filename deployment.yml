---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flm
  annotations:
    kubernetes.io/change-cause: "updated image to cycle"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
        - name: cont15
          image: shaikmustafa/cycle
          ports:
            - containerPort: 80
